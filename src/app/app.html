<div class="min-h-screen bg-slate-950 text-slate-100 antialiased grid grid-cols-[260px_1fr]">
  <aside class="border-r border-slate-800/70 bg-slate-950/95 px-6 py-8">
    <div class="text-sm uppercase text-emerald-400 font-semibold mb-8">
      Crypto Manager
    </div>

    <nav class="space-y-2">
      @for (item of menuItems; track item.label) {
        <a
          [routerLink]="item.path"
          [routerLinkActive]="['bg-slate-800','text-white']"
          class="block rounded-2xl px-4 py-3 text-sm font-medium text-slate-300 transition hover:bg-slate-800 hover:text-white uppercase"
        >
          {{ item.label }}
        </a>
      }
    </nav>
  </aside>

  <main class="p-1">
    <section class="min-h-[calc(100vh-.5rem)] rounded-[5px] border border-slate-800/70 bg-slate-950/90 shadow-[0_25px_80px_-40px_rgba(15,23,42,0.85)]">
      <router-outlet></router-outlet>
    </section>
  </main>
</div>
